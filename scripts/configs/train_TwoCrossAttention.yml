# Bidirectional cross-attention anomaly detector
#   - Uses a *trained* contrastive feature extractor as a frozen backbone
#     (DINOv3 + LoRA + projector). Pass the path via --backbone-ckpt or
#     model.backbone-ckpt below.
#   - Trains: TwoCrossAttention blocks + 1×1 conv decoder (the
#     "投影层"). The backbone stays frozen.
#   - Loss: per-pixel BCE-with-logits against the GT defect mask.
#     Output is a continuous anomaly score map at full resolution.

model:
  name: "dino2 + cross_attention"
  # ──────────────────────────────────────────────────────────────────────────
  # Backbone selection
  # ──────────────────────────────────────────────────────────────────────────
  # Default (no checkpoint, no CLI flag) → raw DINOv3 ViT-B/16 (frozen,
  #   no LoRA, identity projector).
  # To use a trained contrastive checkpoint instead, either:
  #   • uncomment the line below and edit the path, OR
  #   • pass --backbone-ckpt path/to/best.pth on the CLI.
  # backbone-ckpt: "outputs/dino3_vitb16_mydata_margin_1000_moredata/best.pth"
  backbone-ckpt: null
  # backbone-args: null               # only used when backbone-ckpt is null
  # Real backbone layer IDs to feed into cross-attention. With backbone-ckpt,
  # this must be a subset of the checkpoint's args["model"]["layers"].
  # Without backbone-ckpt, raw DINOv3 will be rebuilt to emit these layers.
  feature-layers: [5, 6, 7, 8, 9, 10, 11]
  # feature-layer-idx: -1             # legacy list index fallback if feature-layers is omitted
  embed-dim: null                      # null → inferred from projector output
  num-heads: 4
  num-blocks: 2
  ffn-ratio: 4.0
  dropout: 0.0
  target-shp-row: 512
  target-shp-col: 512

optimizer:
  epochs: 1000
  warmup-epoch: 5
  learn-rate: 0.0001                   # smaller than projector training; we modify a fresh head
  weight-decay: 0.01
  betas: [0.9, 0.999]
  final-scale: 0.01
  grad-scaler: false

dataset:
  root: "mydata"
  batch-size: 8
  num-workers: 4
  figsize: [512, 512]
  spatial-scale: [0.85, 1.0]
  # Fraction of (normal, normal) pairs in each batch (gt = all-zero mask).
  # The remaining (1 - normal_pair_ratio) are (normal, anomaly) pairs with
  # real defect masks. Without normal pairs the model develops a "there's
  # always a defect somewhere" bias and produces spurious activation on
  # truly-normal test pairs. Set to 0 to disable.
  normal-pair-ratio: 0.3

loss:
  # GT defect masks are sparse (defect area ≪ image area), so without
  # pos_weight the model converges to all-zero predictions.
  # null → unweighted; numeric value up-weights positive pixels.
  pos-weight: 20.0

inference:
  # Score maps are sigmoid(logits); these smoothing params apply to the
  # final probability map (see scripts/diagnose.py).
  gaussian-kernel: 5
  gaussian-sigma: 1.0

wandb:
  project: "Robust_Defect_Detection_CL"
  name: "dino3_vitb16_TwoCrossAttention"
  output-path: "outputs/dino3_vitb16_TwoCrossAttention2"
  save-checkpoint-freq: 100
  mode: "disabled"

environment:
  dry: false
  seed: 123
  verbose: true
  device: "cuda"
  gpu-ids: [0]
